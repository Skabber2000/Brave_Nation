<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #1a1a2e;
    color: white;
    position: relative;
  }
  .bg-photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.25;
    filter: grayscale(30%);
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(18,18,31,0.85) 0%, rgba(26,26,46,0.7) 50%, rgba(30,42,74,0.85) 100%);
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    padding: 80px;
    text-align: center;
  }
  .quote-mark {
    font-size: 120px;
    color: #C5A55A;
    line-height: 0.6;
    margin-bottom: 20px;
    opacity: 0.7;
  }
  .quote {
    font-size: 44px;
    font-style: italic;
    line-height: 1.4;
    max-width: 800px;
    margin-bottom: 24px;
    color: #f0ece4;
  }
  .author-name {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 20px;
    color: #C5A55A;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 48px;
  }
  .divider {
    width: 80px;
    height: 3px;
    background: #C5A55A;
    margin-bottom: 36px;
    border-radius: 2px;
  }
  .event-info {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: rgba(197,165,90,0.12);
    border: 1px solid rgba(197,165,90,0.3);
    border-radius: 8px;
    padding: 20px 40px;
    text-align: center;
  }
  .event-info .label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #C5A55A;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .event-info .date {
    font-size: 24px;
    font-weight: 700;
    color: white;
  }
  .event-info .venue {
    font-size: 16px;
    color: #b0a89e;
    margin-top: 4px;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: #C5A55A;
    z-index: 3;
  }
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    background: #C5A55A;
    z-index: 3;
  }
</style>
</head>
<body>
  <img src="../img/author.jpg" alt="" class="bg-photo">
  <div class="overlay"></div>
  <div class="top-bar"></div>
  <div class="content">
    <div class="quote-mark">"</div>
    <div class="quote">Defendo um Estado forte em que ninguem e vassalo, todos somos livres.</div>
    <div class="author-name">Joao Annes — Nacao Valente</div>
    <div class="divider"></div>
    <div class="event-info">
      <div class="label">Lancamento Porto</div>
      <div class="date">25 de Marco | 18h45</div>
      <div class="venue">Porto Business School — Entrada Livre</div>
    </div>
  </div>
  <div class="bottom-bar"></div>
</body></html>
