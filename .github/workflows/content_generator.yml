name: Weekly Content Generator

on:
  schedule:
    # Every Sunday at 18:00 UTC (19:00 Lisbon)
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      theme:
        description: "Override weekly theme (leave blank for auto-rotation)"
        required: false
        type: string
        default: ""

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Generate weekly content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
          CONTENT_THEME: ${{ github.event.inputs.theme }}
        run: python agents/content_generator.py
