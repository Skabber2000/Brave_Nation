name: "LinkedIn Ghostwriter — Nação Valente"

on:
  schedule:
    # Monday 8:00 UTC = 9:00 AM Lisbon
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  ghostwrite:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run LinkedIn Ghostwriter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
        run: python agents/linkedin_ghostwriter.py
